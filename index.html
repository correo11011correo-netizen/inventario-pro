<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="description" content="Sistema profesional de gestión de inventario y punto de venta móvil con escáner de alta precisión.">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    
    
    
    

    <link rel=manifest href=manifest.json>
    <link rel=icon type=image/svg+xml href=logo.svg>
    <link rel=apple-touch-icon href=logo.svg>
    <meta name=theme-color content=#6366f1>
    <meta name=apple-mobile-web-app-capable content=yes>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro v4.0 - Gestión Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader { width: 100% !important; border: none !important; border-radius: 24px; overflow: hidden; background: #000; }
        .tab-active { color: #6366f1; border-top: 4px solid #6366f1; background: #1e1e2e; }
        .scanner-line { height: 2px; background: #22c55e; position: absolute; width: 100%; top: 50%; box-shadow: 0 0 10px #22c55e; animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 35%; } 50% { top: 65%; } 100% { top: 35%; } }
        .verified-border { border-color: #22c55e !important; box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col font-sans overflow-x-hidden">
    
    <header class="bg-slate-900 p-4 shadow-xl sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div>
            <h1 class="font-black tracking-tighter uppercase text-xs text-indigo-400">📦 Gestión de Stock v4.0</h1>
            <div class="text-[8px] text-green-500 font-mono uppercase tracking-widest">Control Total de Inventario</div>
        </div>
        <button onclick="location.reload()" class="bg-indigo-600 text-white px-3 py-1 rounded-full text-[10px] font-bold">RESET</button>
    </header>

    <!-- ESCÁNER HD -->
    <div class="p-4 bg-slate-950">
        <div id="cam-container" class="bg-black rounded-[2rem] border-4 border-slate-800 shadow-2xl relative overflow-hidden h-36 flex items-center justify-center transition-all duration-300">
            <div id="reader" class="w-full"></div>
            <div id="scan-line" class="scanner-line"></div>
            <div id="lock-msg" class="absolute inset-0 flex items-center justify-center bg-green-600/30 hidden z-20">
                <span class="bg-green-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest italic">Verificado</span>
            </div>
        </div>
    </div>

    <!-- MODO: STOCK -->
    <main id="view-stock" class="p-4 space-y-4 pb-32">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl space-y-4">
            <input id="s-codigo" class="w-full bg-slate-950 p-4 rounded-2xl border-2 border-indigo-500/20 font-mono text-green-400 text-2xl text-center" placeholder="ESCANEAR" readonly>
            <input id="s-nombre" class="w-full bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" placeholder="Nombre del Producto">
            <div class="flex gap-2">
                <input id="s-precio" type="number" class="w-1/2 bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" placeholder="Precio ($)">
                <input id="s-cantidad" type="number" class="w-1/2 bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" placeholder="Stock" value="1">
            </div>
            <button onclick="guardarStock()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Guardar / Actualizar</button>
        </div>
        
        <div class="flex justify-between items-center px-2">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Inventario Actual</h2>
            <span id="stock-count" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">0 Items</span>
        </div>
        <div id="lista-stock" class="space-y-2"></div>
    </main>

    <!-- MODO: VENTAS -->
    <main id="view-ventas" class="p-4 space-y-4 pb-32 hidden">
        <div class="bg-slate-900 p-6 rounded-3xl border border-indigo-500/30 text-center shadow-2xl">
            <p class="text-[10px] uppercase font-bold text-indigo-400 mb-1 tracking-widest">Total Presupuesto</p>
            <h2 id="total-venta" class="text-5xl font-black text-white">$0</h2>
        </div>

        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 space-y-3">
            <input id="c-nombre" class="w-full bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" placeholder="Nombre del Cliente">
            <input id="c-telefono" type="tel" class="w-full bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" placeholder="WhatsApp (Ej: 54911...)">
        </div>

        <div id="lista-venta" class="space-y-2"></div>

        <div class="grid grid-cols-2 gap-3 pt-2">
            <button onclick="nuevaVenta()" class="bg-slate-800 py-4 rounded-2xl font-bold text-xs uppercase text-slate-400 border border-slate-700">Limpiar</button>
            <button onclick="enviarPresupuesto()" class="bg-green-600 py-4 rounded-2xl font-black text-xs uppercase shadow-lg flex items-center justify-center gap-2">
                <span>📲 WhatsApp</span>
            </button>
        </div>
    </main>

    <!-- NAVEGACIÓN -->
    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 flex justify-around items-center h-20 z-50">
        <button onclick="switchTab('stock')" id="tab-stock" class="flex flex-col items-center justify-center w-full h-full tab-active">
            <span class="text-xl">📦</span>
            <span class="text-[9px] font-bold mt-1 uppercase">Stock</span>
        </button>
        <button onclick="switchTab('ventas')" id="tab-ventas" class="flex flex-col items-center justify-center w-full h-full text-slate-500">
            <span class="text-xl">🛒</span>
            <span class="text-[9px] font-bold mt-1 uppercase">Venta</span>
        </button>
    </nav>

    <script>
        const camContainer = document.getElementById('cam-container');
        const lockMsg = document.getElementById('lock-msg');
        let inventario = JSON.parse(localStorage.getItem('inv_pro_v4') || '[]');
        let carrito = [];
        let currentTab = 'stock';
        let isPaused = false;

        const html5QrCode = new Html5Qrcode("reader");

        function isValidEAN13(code) {
            if (!/^\d{13}$/.test(code)) return false;
            let sum = 0;
            for (let i = 0; i < 12; i++) sum += parseInt(code[i]) * (i % 2 === 0 ? 1 : 3);
            return ((10 - (sum % 10)) % 10) === parseInt(code[12]);
        }

        async function startCamera() {
            const config = { 
                fps: 30, qrbox: { width: 320, height: 100 }, aspectRatio: 1.77,
                videoConstraints: { width: 1280, height: 720, facingMode: "environment" }
            };
            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                if (!isPaused) procesarLectura(text.trim());
            });
        }

        function procesarLectura(codigo) {
            if (!isValidEAN13(codigo)) return;
            isPaused = true;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            camContainer.classList.add('verified-border');
            lockMsg.classList.remove('hidden');

            if (currentTab === 'stock') {
                document.getElementById('s-codigo').value = codigo;
                const item = inventario.find(i => i.codigo === codigo);
                if (item) {
                    document.getElementById('s-nombre').value = item.nombre;
                    document.getElementById('s-precio').value = item.precio;
                    document.getElementById('s-cantidad').value = item.cantidad;
                }
            } else {
                agregarAlCarrito(codigo);
            }

            setTimeout(() => {
                isPaused = false;
                camContainer.classList.remove('verified-border');
                lockMsg.classList.add('hidden');
            }, 2000);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('view-stock').classList.toggle('hidden', tab !== 'stock');
            document.getElementById('view-ventas').classList.toggle('hidden', tab !== 'ventas');
            document.getElementById('tab-stock').classList.toggle('tab-active', tab === 'stock');
            document.getElementById('tab-ventas').classList.toggle('tab-active', tab === 'ventas');
            render();
        }

        function guardarStock() {
            const codigo = document.getElementById('s-codigo').value;
            const nombre = document.getElementById('s-nombre').value;
            const precio = parseFloat(document.getElementById('s-precio').value) || 0;
            const cantidad = parseInt(document.getElementById('s-cantidad').value) || 0;

            if (!codigo || !nombre) return alert("Escanea un producto y ponle un nombre");

            const idx = inventario.findIndex(i => i.codigo === codigo);
            if (idx > -1) {
                inventario[idx] = { codigo, nombre, precio, cantidad };
            } else {
                inventario.push({ codigo, nombre, precio, cantidad });
            }

            localStorage.setItem('inv_pro_v4', JSON.stringify(inventario));
            limpiarForm();
            render();
        }

        function borrarDelStock(codigo) {
            if (confirm("¿Estás seguro de eliminar este producto del inventario?")) {
                inventario = inventario.filter(i => i.codigo !== codigo);
                localStorage.setItem('inv_pro_v4', JSON.stringify(inventario));
                render();
            }
        }

        function editarDelStock(codigo) {
            const item = inventario.find(i => i.codigo === codigo);
            if (item) {
                document.getElementById('s-codigo').value = item.codigo;
                document.getElementById('s-nombre').value = item.nombre;
                document.getElementById('s-precio').value = item.precio;
                document.getElementById('s-cantidad').value = item.cantidad;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function agregarAlCarrito(codigo) {
            const producto = inventario.find(i => i.codigo === codigo);
            if (!producto) return alert("Producto no está en el inventario");
            const item = carrito.find(c => c.codigo === codigo);
            if (item) item.cantidad++;
            else carrito.push({ ...producto, cantidad: 1 });
            render();
        }

        function quitarDelCarrito(idx) {
            carrito.splice(idx, 1);
            render();
        }

        function nuevaVenta() {
            if (confirm("¿Limpiar presupuesto?")) {
                carrito = [];
                render();
            }
        }

        function render() {
            const listaS = document.getElementById('lista-stock');
            const listaV = document.getElementById('lista-venta');
            listaS.innerHTML = ''; listaV.innerHTML = '';
            
            if (currentTab === 'stock') {
                document.getElementById('stock-count').innerText = `${inventario.length} Items`;
                inventario.slice().reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = "bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center mb-2 animate-fadeIn";
                    div.innerHTML = `
                        <div onclick="editarDelStock('${item.codigo}')" class="flex-grow">
                            <p class='font-bold text-indigo-400'>${item.nombre}</p>
                            <p class='text-[9px] opacity-50'>${item.codigo} • $${item.precio}</p>
                        </div>
                        <div class='flex items-center gap-4'>
                            <div class='bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 font-black text-xs'>${item.cantidad}</div>
                            <button onclick="borrarDelStock('${item.codigo}')" class="text-slate-600 p-2 text-lg">🗑️</button>
                        </div>`;
                    listaS.appendChild(div);
                });
            } else {
                let total = 0;
                carrito.forEach((item, idx) => {
                    total += (item.precio * item.cantidad);
                    const div = document.createElement('div');
                    div.className = "bg-slate-900 p-4 rounded-2xl border border-indigo-900/30 flex justify-between items-center mb-2";
                    div.innerHTML = `<div class='flex-grow'><p class='font-bold text-sm'>${item.nombre}</p><p class='text-[10px] text-slate-500'>${item.cantidad} x $${item.precio}</p></div><div class='flex items-center gap-4'><p class='font-black text-indigo-400'>$${item.precio * item.cantidad}</p><button onclick='quitarDelCarrito(${idx})' class='text-slate-600'>✕</button></div>`;
                    listaV.appendChild(div);
                });
                document.getElementById('total-venta').innerText = `$${total}`;
            }
        }

        function enviarPresupuesto() {
            if (carrito.length === 0) return;
            const nombreCli = document.getElementById('c-nombre').value || "Cliente";
            const telCli = document.getElementById('c-telefono').value.replace(/\D/g, "");
            if (!telCli) return alert("Ingresa el WhatsApp del cliente");
            let total = 0;
            let msg = `*¡Hola ${nombreCli}!* Presupuesto detallado:%0A%0A`;
            carrito.forEach(i => { total += (i.precio * i.cantidad); msg += `• *${i.cantidad}x ${i.nombre}* : $${i.precio * i.cantidad}%0A`; });
            msg += `%0A*TOTAL: $${total}*%0A%0AGracias por elegirnos.`;
            window.open(`https://wa.me/${telCli}?text=${msg}`);
        }

        function limpiarForm() {
            ['s-codigo','s-nombre','s-precio','s-cantidad'].forEach(id => document.getElementById(id).value = (id === 's-cantidad' ? '1' : ''));
        }

        window.onload = () => { render(); startCamera(); };
    </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}</script></body>
</html>
