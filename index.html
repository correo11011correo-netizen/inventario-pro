<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Local Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader { width: 100% !important; border: none !important; border-radius: 15px; overflow: hidden; }
        .item-row { transition: all 0.2s; }
        .item-row:active { background: #27272a; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col font-sans">
    
    <header class="bg-indigo-600 p-4 shadow-xl sticky top-0 z-50 flex justify-between items-center">
        <h1 class="font-black tracking-tighter uppercase text-sm">Stock Local v2.0</h1>
        <button onclick="exportarCSV()" class="text-[10px] bg-indigo-800 px-3 py-1 rounded-full font-bold">EXPORTAR EXCEL</button>
    </header>

    <main class="p-4 space-y-6 pb-32">
        <!-- SECCIÓN ESCÁNER -->
        <div class="bg-zinc-900 p-2 rounded-2xl border border-zinc-800 shadow-2xl">
            <div id="reader"></div>
        </div>

        <!-- FORMULARIO DE CARGA MANUAL / EDICIÓN -->
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 space-y-3">
            <h2 class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Carga Manual / Escaneado</h2>
            <input id="inp-codigo" class="w-full bg-black p-4 rounded-xl border border-zinc-700 text-lg font-mono" placeholder="Código de Barras">
            <input id="inp-nombre" class="w-full bg-black p-4 rounded-xl border border-zinc-700" placeholder="Nombre del Producto">
            <div class="flex gap-2">
                <input id="inp-cantidad" type="number" class="w-1/3 bg-black p-4 rounded-xl border border-zinc-700" placeholder="Cant." value="1">
                <button onclick="guardarLocal()" class="w-2/3 bg-indigo-600 rounded-xl font-bold uppercase tracking-tighter hover:bg-indigo-500 active:scale-95 transition-all">Guardar en Stock</button>
            </div>
        </div>

        <!-- LISTADO DE INVENTARIO -->
        <div class="space-y-3">
            <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest px-2 flex justify-between">
                <span>Inventario Actual</span>
                <span id="total-items">0 items</span>
            </h2>
            <div id="lista-stock" class="space-y-2">
                <!-- Los items aparecerán aquí -->
            </div>
        </div>
    </main>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventario_pro') || '[]');
        const html5QrCode = new Html5Qrcode("reader");

        // Iniciar Escáner
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            document.getElementById('inp-codigo').value = text;
            if (navigator.vibrate) navigator.vibrate(100);
            // Intentar buscar si ya existe
            const existente = inventario.find(i => i.codigo === text);
            if (existente) {
                document.getElementById('inp-nombre').value = existente.nombre;
                document.getElementById('inp-cantidad').value = parseInt(existente.cantidad) + 1;
            }
        });

        function guardarLocal() {
            const codigo = document.getElementById('inp-codigo').value;
            const nombre = document.getElementById('inp-nombre').value || 'Sin nombre';
            const cantidad = document.getElementById('inp-cantidad').value || 1;

            if (!codigo) return alert("Escanea o escribe un código");

            const index = inventario.findIndex(i => i.codigo === codigo);
            if (index > -1) {
                inventario[index] = { codigo, nombre, cantidad, fecha: new Date().toLocaleString() };
            } else {
                inventario.push({ codigo, nombre, cantidad, fecha: new Date().toLocaleString() });
            }

            localStorage.setItem('inventario_pro', JSON.stringify(inventario));
            limpiarForm();
            render();
        }

        function borrarItem(codigo) {
            if (confirm("¿Borrar este producto?")) {
                inventario = inventario.filter(i => i.codigo !== codigo);
                localStorage.setItem('inventario_pro', JSON.stringify(inventario));
                render();
            }
        }

        function editarItem(codigo) {
            const item = inventario.find(i => i.codigo === codigo);
            document.getElementById('inp-codigo').value = item.codigo;
            document.getElementById('inp-nombre').value = item.nombre;
            document.getElementById('inp-cantidad').value = item.cantidad;
            window.scrollTo(0,0);
        }

        function limpiarForm() {
            document.getElementById('inp-codigo').value = '';
            document.getElementById('inp-nombre').value = '';
            document.getElementById('inp-cantidad').value = '1';
        }

        function render() {
            const lista = document.getElementById('lista-stock');
            lista.innerHTML = '';
            document.getElementById('total-items').innerText = `${inventario.length} items`;

            inventario.slice().reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex justify-between items-center item-row";
                div.innerHTML = `
                    <div onclick="editarItem('${item.codigo}')" class="flex-grow">
                        <h3 class="font-bold text-indigo-400">${item.nombre}</h3>
                        <p class="text-[10px] font-mono text-zinc-500">${item.codigo} • ${item.fecha}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xl font-black bg-zinc-800 px-3 py-1 rounded-lg border border-zinc-700 text-white">${item.cantidad}</span>
                        <button onclick="borrarItem('${item.codigo}')" class="text-zinc-600 hover:text-red-500 p-2">✕</button>
                    </div>
                `;
                lista.appendChild(div);
            });
        }

        function exportarCSV() {
            let csv = "Codigo,Nombre,Cantidad,Fecha\n";
            inventario.forEach(i => {
                csv += `${i.codigo},${i.nombre},${i.cantidad},${i.fecha}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'inventario_stock.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        window.onload = render;
    </script>
</body>
</html>
