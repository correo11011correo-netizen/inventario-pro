<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario & Ventas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader { width: 100% !important; border: none !important; border-radius: 15px; overflow: hidden; }
        .tab-active { color: #6366f1; border-top: 3px solid #6366f1; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col font-sans select-none">
    
    <!-- HEADER -->
    <header class="bg-zinc-900 p-4 shadow-xl sticky top-0 z-50 flex justify-between items-center border-b border-zinc-800">
        <h1 id="view-title" class="font-black tracking-tighter uppercase text-sm text-indigo-400">📦 Gestión de Stock</h1>
        <button onclick="exportarCSV()" class="text-[9px] bg-zinc-800 border border-zinc-700 px-3 py-1 rounded-full font-bold">EXPORTAR</button>
    </header>

    <!-- ÁREA DE ESCÁNER (FIJA PARA AMBOS MODOS) -->
    <div class="p-4 bg-zinc-950">
        <div class="bg-zinc-900 p-2 rounded-2xl border border-zinc-800 shadow-2xl">
            <div id="reader"></div>
        </div>
    </div>

    <!-- VISTA: GESTIÓN DE STOCK -->
    <main id="view-stock" class="p-4 space-y-4 pb-32">
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 space-y-3">
            <input id="s-codigo" class="w-full bg-black p-4 rounded-xl border border-zinc-700 font-mono text-indigo-400" placeholder="Código Escaneado">
            <input id="s-nombre" class="w-full bg-black p-4 rounded-xl border border-zinc-700" placeholder="Nombre del Producto">
            <div class="flex gap-2">
                <input id="s-precio" type="number" class="w-1/2 bg-black p-4 rounded-xl border border-zinc-700" placeholder="Precio ($)">
                <input id="s-cantidad" type="number" class="w-1/2 bg-black p-4 rounded-xl border border-zinc-700" placeholder="Stock" value="1">
            </div>
            <button onclick="guardarStock()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg active:scale-95 transition-all">Guardar Producto</button>
        </div>
        <div id="lista-stock" class="space-y-2"></div>
    </main>

    <!-- VISTA: PRESUPUESTO / VENTAS -->
    <main id="view-ventas" class="p-4 space-y-4 pb-32 hidden">
        <div class="bg-indigo-900/30 p-5 rounded-2xl border border-indigo-500/30 text-center">
            <p class="text-[10px] uppercase font-bold text-indigo-300 mb-1">Total Presupuesto</p>
            <h2 id="total-venta" class="text-4xl font-black text-white">$0</h2>
        </div>
        <div id="lista-venta" class="space-y-2">
            <!-- Items del carrito aparecerán aquí -->
        </div>
        <button onclick="enviarPresupuesto()" class="w-full bg-green-600 py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg flex items-center justify-center gap-2">
            📲 Enviar Presupuesto
        </button>
    </main>

    <!-- NAVEGACIÓN INFERIOR (TABS) -->
    <nav class="fixed bottom-0 w-full bg-zinc-900 border-t border-zinc-800 flex justify-around items-center h-20 z-50">
        <button onclick="switchTab('stock')" id="tab-stock" class="flex flex-col items-center justify-center w-full h-full tab-active">
            <span class="text-xl">📦</span>
            <span class="text-[10px] font-bold uppercase mt-1">Stock</span>
        </button>
        <button onclick="switchTab('ventas')" id="tab-ventas" class="flex flex-col items-center justify-center w-full h-full text-zinc-500">
            <span class="text-xl">🛒</span>
            <span class="text-[10px] font-bold uppercase mt-1">Ventas</span>
        </button>
    </nav>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inv_pro') || '[]');
        let carrito = [];
        let currentTab = 'stock';
        const html5QrCode = new Html5Qrcode("reader");

        // ESCÁNER
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
            if (navigator.vibrate) navigator.vibrate(100);
            if (currentTab === 'stock') {
                document.getElementById('s-codigo').value = text;
                const item = inventario.find(i => i.codigo === text);
                if (item) {
                    document.getElementById('s-nombre').value = item.nombre;
                    document.getElementById('s-precio').value = item.precio;
                }
            } else {
                agregarAlCarrito(text);
            }
        });

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('view-stock').classList.toggle('hidden', tab !== 'stock');
            document.getElementById('view-ventas').classList.toggle('hidden', tab !== 'ventas');
            document.getElementById('tab-stock').classList.toggle('tab-active', tab === 'stock');
            document.getElementById('tab-ventas').classList.toggle('tab-active', tab === 'ventas');
            document.getElementById('view-title').innerText = tab === 'stock' ? "📦 Gestión de Stock" : "🛒 Presupuesto de Venta";
            render();
        }

        function guardarStock() {
            const codigo = document.getElementById('s-codigo').value;
            const nombre = document.getElementById('s-nombre').value || 'Sin nombre';
            const precio = document.getElementById('s-precio').value || 0;
            const cantidad = document.getElementById('s-cantidad').value || 1;

            if (!codigo) return alert("Escanea un código");

            const index = inventario.findIndex(i => i.codigo === codigo);
            if (index > -1) {
                inventario[index] = { codigo, nombre, precio, cantidad };
            } else {
                inventario.push({ codigo, nombre, precio, cantidad });
            }

            localStorage.setItem('inv_pro', JSON.stringify(inventario));
            limpiarForm();
            render();
        }

        function agregarAlCarrito(codigo) {
            const producto = inventario.find(i => i.codigo === codigo);
            if (!producto) return alert("Producto no encontrado en Stock. Regístralo primero en la pestaña Stock.");

            const itemInCar = carrito.find(c => c.codigo === codigo);
            if (itemInCar) {
                itemInCar.cantidad++;
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            render();
        }

        function render() {
            if (currentTab === 'stock') {
                const lista = document.getElementById('lista-stock');
                lista.innerHTML = '';
                inventario.slice().reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex justify-between items-center";
                    div.innerHTML = `<div><p class='font-bold text-indigo-400'>${item.nombre}</p><p class='text-[10px] text-zinc-500'>${item.codigo} • $${item.precio}</p></div><div class='text-right'><span class='bg-zinc-800 px-3 py-1 rounded font-black'>${item.cantidad}</span></div>`;
                    lista.appendChild(div);
                });
            } else {
                const lista = document.getElementById('lista-venta');
                lista.innerHTML = '';
                let total = 0;
                carrito.forEach((item, idx) => {
                    total += (item.precio * item.cantidad);
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 p-4 rounded-xl border border-indigo-900/50 flex justify-between items-center";
                    div.innerHTML = `<div><p class='font-bold'>${item.nombre}</p><p class='text-[10px] opacity-50'>${item.cantidad} x $${item.precio}</p></div><p class='font-black'>$${item.precio * item.cantidad}</p>`;
                    lista.appendChild(div);
                });
                document.getElementById('total-venta').innerText = `$${total}`;
            }
        }

        function enviarPresupuesto() {
            if (carrito.length === 0) return alert("El carrito está vacío");
            let total = 0;
            let msg = "*Presupuesto de Venta*%0A%0A";
            carrito.forEach(i => {
                total += (i.precio * i.cantidad);
                msg += `- ${i.cantidad}x ${i.nombre}: $${i.precio * i.cantidad}%0A`;
            });
            msg += `%0A*TOTAL FINAL: $${total}*`;
            window.open(`https://wa.me/?text=${msg}`);
            carrito = []; // Limpiar tras enviar
            render();
        }

        function limpiarForm() {
            ['s-codigo','s-nombre','s-precio','s-cantidad'].forEach(id => document.getElementById(id).value = (id === 's-cantidad' ? '1' : ''));
        }

        window.onload = render;
    </script>
</body>
</html>
