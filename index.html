<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro v3.6 - Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader { width: 100% !important; border: none !important; border-radius: 24px; overflow: hidden; background: #000; }
        .tab-active { color: #6366f1; border-top: 4px solid #6366f1; background: #1e1e2e; }
        .log-entry { font-family: monospace; font-size: 10px; border-bottom: 1px solid #333; padding: 4px 0; user-select: text; }
        .log-success { color: #4ade80; font-weight: bold; }
        .log-match { color: #fbbf24; }
        .verified-border { border-color: #22c55e !important; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        .scanner-line { height: 2px; background: #ef4444; position: absolute; width: 100%; top: 50%; box-shadow: 0 0 10px #ef4444; animation: scan 2s infinite ease-in-out; z-index: 10; }
        @keyframes scan { 0% { top: 30%; } 50% { top: 70%; } 100% { top: 30%; } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col font-sans overflow-x-hidden">
    
    <header class="bg-slate-900 p-4 shadow-xl sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div>
            <h1 class="font-black tracking-tighter uppercase text-sm text-indigo-400">📦 Inventario Pro v3.6</h1>
            <div id="status-log" class="text-[9px] text-green-500 font-mono italic">SISTEMA ESTABLE</div>
        </div>
        <div class="flex gap-2">
            <button onclick="copiarLogs()" class="bg-slate-800 border border-slate-700 px-3 py-1 rounded text-[9px] font-bold">COPIAR LOGS</button>
            <button onclick="location.reload()" class="bg-indigo-600 px-3 py-1 rounded text-[9px] font-bold">RESET</button>
        </div>
    </header>

    <!-- ÁREA DE ESCÁNER CON FEEDBACK VISUAL -->
    <div class="p-4 bg-slate-950">
        <div id="cam-container" class="bg-black rounded-[2rem] border-4 border-slate-800 shadow-2xl relative overflow-hidden h-44 transition-all duration-300">
            <div id="reader"></div>
            <div id="scan-line" class="scanner-line"></div>
            <div id="lock-msg" class="absolute inset-0 flex items-center justify-center bg-green-600/20 hidden">
                <span class="bg-green-600 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Código Bloqueado</span>
            </div>
        </div>
    </div>

    <!-- TERMINAL DE LOGS -->
    <div class="px-4 h-24 mb-4">
        <div id="log-terminal" class="bg-black rounded-xl p-3 h-full overflow-y-auto border border-slate-800 text-[9px] shadow-inner opacity-60">
            <div class="text-zinc-500 italic">Esperando escaneo...</div>
        </div>
    </div>

    <!-- MODO: STOCK -->
    <main id="view-stock" class="p-4 space-y-4 pb-32">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl space-y-4">
            <input id="s-codigo" class="w-full bg-slate-950 p-4 rounded-2xl border-2 border-indigo-500/30 font-mono text-indigo-400 text-2xl text-center" placeholder="ESCANEANDO..." readonly>
            <input id="s-nombre" class="w-full bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" placeholder="Nombre del Producto">
            <div class="flex gap-2">
                <input id="s-precio" type="number" class="w-1/2 bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" placeholder="Precio ($)">
                <input id="s-cantidad" type="number" class="w-1/2 bg-slate-950 p-4 rounded-2xl border border-slate-700 text-sm" value="1">
            </div>
            <button onclick="guardarStock()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Guardar en Stock</button>
        </div>
        <div id="lista-stock" class="space-y-2"></div>
    </main>

    <!-- MODO: VENTAS -->
    <main id="view-ventas" class="p-4 space-y-4 pb-32 hidden">
        <div class="bg-indigo-900/20 p-6 rounded-3xl border border-indigo-500/30 text-center">
            <p class="text-[10px] uppercase font-bold text-indigo-400 mb-1">Total</p>
            <h2 id="total-venta" class="text-4xl font-black text-white">$0</h2>
        </div>
        <div id="lista-venta" class="space-y-2"></div>
        <button onclick="enviarPresupuesto()" class="w-full bg-green-600 py-5 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2">📲 Enviar por WhatsApp</button>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 flex justify-around items-center h-20 z-50">
        <button onclick="switchTab('stock')" id="tab-stock" class="flex flex-col items-center justify-center w-full h-full tab-active">
            <span class="text-xl">📦</span>
            <span class="text-[9px] font-bold uppercase mt-1">Stock</span>
        </button>
        <button onclick="switchTab('ventas')" id="tab-ventas" class="flex flex-col items-center justify-center w-full h-full text-slate-500">
            <span class="text-xl">🛒</span>
            <span class="text-[9px] font-bold uppercase mt-1">Venta</span>
        </button>
    </nav>

    <script>
        const terminal = document.getElementById('log-terminal');
        const camContainer = document.getElementById('cam-container');
        const scanLine = document.getElementById('scan-line');
        const lockMsg = document.getElementById('lock-msg');

        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = `log-entry ${type ? 'log-' + type : ''}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.prepend(div);
        }

        function copiarLogs() {
            const texto = Array.from(terminal.querySelectorAll('.log-entry')).map(e => e.innerText).join('\n');
            navigator.clipboard.writeText(texto).then(() => alert("Logs copiados"));
        }

        let inventario = JSON.parse(localStorage.getItem('inv_pro_v3_3') || '[]');
        let carrito = [];
        let currentTab = 'stock';
        let lastCodes = [];
        let isPaused = false;
        const VOTOS_OK = 3; 

        const html5QrCode = new Html5Qrcode("reader");

        async function startCamera() {
            const config = { fps: 25, qrbox: { width: 300, height: 120 }, aspectRatio: 1.0 };
            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                if (!isPaused) filtrarLectura(text.trim());
            }).catch(err => addLog(`Error: ${err}`, "error"));
        }

        function filtrarLectura(codigo) {
            addLog(`Leyendo: ${codigo}`);
            lastCodes.push(codigo);
            if (lastCodes.length > 5) lastCodes.shift();

            const conteo = lastCodes.reduce((acc, c) => { acc[c] = (acc[c] || 0) + 1; return acc; }, {});
            const masFrecuente = Object.keys(conteo).reduce((a, b) => conteo[a] > conteo[b] ? a : b);

            if (conteo[masFrecuente] >= VOTOS_OK) {
                bloquearYProcesar(masFrecuente);
            }
        }

        function bloquearYProcesar(codigo) {
            isPaused = true;
            lastCodes = [];
            
            // Efecto Visual de Bloqueo
            camContainer.classList.add('verified-border');
            scanLine.classList.add('hidden');
            lockMsg.classList.remove('hidden');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            addLog(`VERIFICADO ✅: ${codigo}`, "success");
            
            if (currentTab === 'stock') {
                document.getElementById('s-codigo').value = codigo;
                const item = inventario.find(i => i.codigo === codigo);
                if (item) {
                    document.getElementById('s-nombre').value = item.nombre;
                    document.getElementById('s-precio').value = item.precio;
                }
            } else {
                agregarAlCarrito(codigo);
            }

            // Desbloquear tras 2.5 segundos
            setTimeout(() => {
                isPaused = false;
                camContainer.classList.remove('verified-border');
                scanLine.classList.remove('hidden');
                lockMsg.classList.add('hidden');
                addLog("Escáner reactivado...", "match");
            }, 2500);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('view-stock').classList.toggle('hidden', tab !== 'stock');
            document.getElementById('view-ventas').classList.toggle('hidden', tab !== 'ventas');
            document.getElementById('tab-stock').classList.toggle('tab-active', tab === 'stock');
            document.getElementById('tab-ventas').classList.toggle('tab-active', tab === 'ventas');
            render();
        }

        function guardarStock() {
            const codigo = document.getElementById('s-codigo').value;
            const nombre = document.getElementById('s-nombre').value;
            if (!codigo || !nombre) return alert("Faltan datos");
            const precio = parseFloat(document.getElementById('s-precio').value) || 0;
            const cantidad = parseInt(document.getElementById('s-cantidad').value) || 0;
            
            const idx = inventario.findIndex(i => i.codigo === codigo);
            if (idx > -1) inventario[idx] = { codigo, nombre, precio, cantidad };
            else inventario.push({ codigo, nombre, precio, cantidad });
            
            localStorage.setItem('inv_pro_v3_3', JSON.stringify(inventario));
            addLog(`Guardado: ${nombre}`, "success");
            limpiarForm();
            render();
        }

        function agregarAlCarrito(codigo) {
            const producto = inventario.find(i => i.codigo === codigo);
            if (!producto) {
                addLog(`No registrado: ${codigo}`, "error");
                return;
            }
            const item = carrito.find(c => c.codigo === codigo);
            if (item) item.cantidad++;
            else carrito.push({ ...producto, cantidad: 1 });
            render();
        }

        function render() {
            const listaS = document.getElementById('lista-stock');
            const listaV = document.getElementById('lista-venta');
            listaS.innerHTML = ''; listaV.innerHTML = '';
            
            inventario.slice().reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center mb-2";
                div.innerHTML = `<div><p class='font-bold text-indigo-400'>${item.nombre}</p><p class='text-[9px] opacity-50'>${item.codigo} • $${item.precio}</p></div><p class='font-black'>${item.cantidad}</p>`;
                listaS.appendChild(div);
            });

            let total = 0;
            carrito.forEach(item => {
                total += (item.precio * item.cantidad);
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-4 rounded-xl border border-indigo-900/30 flex justify-between items-center mb-2";
                div.innerHTML = `<div><p class='font-bold'>${item.nombre}</p><p class='text-[10px] opacity-50'>${item.cantidad} x $${item.precio}</p></div><p class='font-black'>$${item.precio * item.cantidad}</p>`;
                listaV.appendChild(div);
            });
            document.getElementById('total-venta').innerText = `$${total}`;
        }

        function enviarPresupuesto() {
            if (carrito.length === 0) return;
            let total = 0;
            let msg = "*PRESUPUESTO*%0A";
            carrito.forEach(i => {
                total += (i.precio * i.cantidad);
                msg += `• ${i.cantidad}x ${i.nombre}: $${i.precio * i.cantidad}%0A`;
            });
            msg += `%0A*TOTAL: $${total}*`;
            window.open(`https://wa.me/?text=${msg}`);
            carrito = []; render();
        }

        function limpiarForm() {
            ['s-codigo','s-nombre','s-precio','s-cantidad'].forEach(id => document.getElementById(id).value = (id === 's-cantidad' ? '1' : ''));
        }

        window.onload = () => { render(); startCamera(); };
    </script>
</body>
</html>
